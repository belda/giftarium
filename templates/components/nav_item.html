{% load static %}
{% url url as nav_url %}
<li>
  <a href="{{ nav_url }}"
     class="group flex items-center w-full rounded-md text-sm font-semibold
            {% if request.path == nav_url %}bg-gray-800 text-white{% else %}text-gray-400 hover:bg-gray-800 hover:text-white{% endif %}"
     :class="sidebarCollapsed ? 'justify-center h-12 px-2' : 'gap-x-3 p-2'"
     title="{{ label }}">
    <i class="fa-solid fa-{{ icon }} fa-xl fa-fw shrink-0"></i>
    <span x-show="!sidebarCollapsed" x-cloak>{{ label }}</span>
  </a>
</li>
