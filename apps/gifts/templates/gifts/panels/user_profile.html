{% load i18n %}
{% if saved %}
<p class="mb-3 text-sm text-green-600 font-medium">{% trans "Saved." %}</p>
{% endif %}
<form hx-post="{% url 'user_settings_panel_gift_profile' %}"
      hx-target="#panel-gift_profile"
      hx-swap="innerHTML">
  {% csrf_token %}
  <div>
    <label for="{{ form.birthday.id_for_label }}" class="block text-sm font-medium text-gray-700 mb-1">
      {{ form.birthday.label }}
    </label>
    {{ form.birthday }}
  </div>
  <div class="mt-4 flex justify-end">
    <button type="submit" class="btn-primary">{% trans "Save" %}</button>
  </div>
</form>
